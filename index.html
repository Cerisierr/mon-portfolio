<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cerisierr_</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    #bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -1;
    }
    .overlay {
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen">

  <!-- Video Background -->
  <video id="bg-video" autoplay loop playsinline>
    <source src="background.mp4" type="video/mp4">
    Votre navigateur ne supporte pas la vidéo.
  </video>

  <!-- Main Content -->
  <div class="overlay w-full max-w-md mx-auto p-8 rounded-3xl text-center relative z-10 border border-white/10">
    
    <div class="flex justify-center mb-6">
      <div class="w-24 h-24 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center text-5xl shadow-xl">
        🎤
      </div>
    </div>

    <h1 class="text-5xl font-bold mb-1">cerisierr_</h1>
    <p class="text-emerald-400 flex items-center justify-center gap-2 mb-8">
      <span class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></span>
      Belgium
    </p>

    <!-- Now Playing Card -->
    <div class="bg-zinc-900/80 border border-white/10 rounded-2xl p-6 mb-8">
      <p class="text-sm text-gray-400 mb-2">Currently listening to</p>
      <div class="flex items-center gap-4">
        <div class="w-16 h-16 bg-zinc-800 rounded-xl flex-shrink-0 flex items-center justify-center text-4xl">
          🔥
        </div>
        <div class="text-left">
          <p class="font-semibold">My First Beat Attempt</p>
          <p class="text-gray-400 text-sm">by Cerisierr_</p>
        </div>
      </div>
    </div>

    <!-- Social Icons -->
    <div class="flex justify-center gap-6 text-3xl mb-10">
      <a href="https://discord.com/invite/8HBaJ9vmhA" target="_blank" class="hover:text-indigo-400 transition"><i class="fa-brands fa-discord"></i></a>
      <a href="#" class="hover:text-red-500 transition"><i class="fa-brands fa-youtube"></i></a>
      <a href="#" class="hover:text-pink-500 transition"><i class="fa-brands fa-soundcloud"></i></a>
      <a href="#" class="hover:text-white transition"><i class="fa-brands fa-spotify"></i></a>
    </div>

    <p class="text-xs text-gray-500">
      Beginner Beatmaker • Still learning
    </p>
  </div>

  <script>
    // Autoplay video with sound
    const video = document.getElementById('bg-video');
    video.muted = false;
    
    // Try to play (some browsers block autoplay with sound)
    video.play().catch(() => {
      video.muted = true;
      video.play();
    });
  </script>
</body>
</html>
