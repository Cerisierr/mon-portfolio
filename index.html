<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>cerisierr_</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
    #bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -1;
      filter: brightness(0.65) contrast(1.1);
    }
    .overlay {
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
    }
    .volume-control {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.65);
      padding: 6px 10px;
      border-radius: 9999px;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    .volume-control:hover {
      opacity: 1;
      visibility: visible;
    }
  </style>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen">

  <!-- Video Background -->
  <video id="bg-video" autoplay loop playsinline>
    <source src="background.mp4" type="video/mp4">
  </video>

  <!-- Volume Control (comme l'original) -->
  <div class="volume-control" id="volume-container">
    <button id="volume-btn" class="text-white text-xl hover:text-emerald-400 transition">
      <i class="fa-solid fa-volume-high"></i>
    </button>
    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.65"
           class="w-24 accent-white">
  </div>

  <!-- Main Card -->
  <div class="overlay w-full max-w-md mx-auto p-8 rounded-3xl relative z-10">
    
    <div class="flex justify-center mb-2">
      <p class="text-sm text-gray-400 flex items-center gap-1.5">
        <span class="text-base">🇧🇪</span> Belgium
      </p>
    </div>

    <div class="flex justify-center mb-6">
      <div class="relative">
        <div class="w-28 h-28 bg-gradient-to-br from-purple-600 via-pink-600 to-rose-500 rounded-2xl flex items-center justify-center text-6xl shadow-2xl border-4 border-zinc-900">
          🎤
        </div>
        <div class="absolute bottom-1 right-1 w-6 h-6 bg-emerald-500 rounded-full border-4 border-zinc-900 animate-pulse"></div>
      </div>
    </div>

    <h1 class="text-4xl font-bold text-center mb-1">cerisierr_</h1>
    <p class="text-center text-emerald-400 text-sm mb-8">Aspiring Beatmaker</p>

    <!-- Listening Card -->
    <div class="bg-zinc-900/90 rounded-2xl p-5 mb-8">
      <p class="text-xs uppercase tracking-widest text-gray-400 mb-3">Listening to</p>
      <div class="flex gap-4">
        <div class="w-16 h-16 bg-zinc-800 rounded-xl flex-shrink-0 flex items-center justify-center text-4xl">
          🔥
        </div>
        <div class="flex-1 min-w-0">
          <p class="font-semibold text-white truncate">Dark Trap Beat</p>
          <p class="text-gray-400 text-sm truncate">Cerisierr_ - WIP</p>
        </div>
      </div>
    </div>

    <!-- View Counter avec icône -->
    <div class="flex justify-center items-center gap-2 text-xs text-gray-500 mb-8">
      <i class="fa-solid fa-eye text-lg"></i>
      <span id="view-count">0</span>
    </div>

    <!-- Social Icons -->
    <div class="flex justify-center gap-6 text-3xl text-gray-400">
      <a href="https://discord.com/invite/8HBaJ9vmhA" target="_blank" class="hover:text-indigo-400 transition"><i class="fa-brands fa-discord"></i></a>
      <a href="#" class="hover:text-red-500 transition"><i class="fa-brands fa-youtube"></i></a>
      <a href="#" class="hover:text-orange-500 transition"><i class="fa-brands fa-soundcloud"></i></a>
    </div>
  </div>

  <script>
    const video = document.getElementById('bg-video');
    const volumeBtn = document.getElementById('volume-btn');
    const volumeSlider = document.getElementById('volume-slider');
    const volumeContainer = document.getElementById('volume-container');

    // Volume Control
    function updateVolume() {
      video.volume = parseFloat(volumeSlider.value);
      volumeBtn.innerHTML = video.volume === 0 
        ? '<i class="fa-solid fa-volume-xmark"></i>' 
        : '<i class="fa-solid fa-volume-high"></i>';
    }

    volumeSlider.addEventListener('input', updateVolume);
    volumeBtn.addEventListener('click', () => {
      video.muted = !video.muted;
      updateVolume();
    });

    // Afficher le contrôle volume seulement au survol (coin haut gauche)
    document.addEventListener('mousemove', (e) => {
      if (e.clientX < 250 && e.clientY < 120) {
        volumeContainer.style.opacity = '1';
        volumeContainer.style.visibility = 'visible';
      } else {
        volumeContainer.style.opacity = '0';
        volumeContainer.style.visibility = 'hidden';
      }
    });

    // Lancer la vidéo + son
    video.volume = 0.65;
    video.play().catch(err => {
      console.log("Autoplay bloqué, clic sur la page pour lancer le son");
    });

    // View Counter (1 par jour)
    function getToday() {
      return new Date().toISOString().split('T')[0];
    }

    const today = getToday();
    let totalViews = parseInt(localStorage.getItem('totalViews')) || 1243;

    if (localStorage.getItem('lastViewDate') !== today) {
      totalViews += 1;
      localStorage.setItem('totalViews', totalViews);
      localStorage.setItem('lastViewDate', today);
    }

    document.getElementById('view-count').textContent = totalViews;

    // Discord Status
    const userId = "1382814043450118214";
    async function updateDiscordStatus() {
      try {
        const res = await fetch(`https://api.lanyard.rest/v1/users/${userId}`);
        const data = await res.json();
        if (data.success && data.data.activities.length > 0) {
          const activity = data.data.activities[0];
          document.querySelector('.font-semibold').textContent = activity.details || "Working on beats";
        }
      } catch(e) {}
    }

    setInterval(updateDiscordStatus, 10000);
    updateDiscordStatus();
  </script>
</body>
</html>
